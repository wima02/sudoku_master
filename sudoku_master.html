<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sudoku Master</title>
    <!-- Tailwind CSS für das Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Standalone Versionen für den Browser) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel um den JSX Code im Browser in echtes JavaScript zu übersetzen -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Verhindert das Standard-Zoomen bei Doppelklick auf Smartphones */
        body { touch-action: manipulation; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- ICONS (Direkt als SVGs eingebaut, damit keine externen Dateien nötig sind) ---
        const Play = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="6 3 20 12 6 21 6 3"/></svg>
        );
        const Pause = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        );
        const RotateCcw = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );
        const Eraser = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
        );
        const PenLine = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        );
        const Lightbulb = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
        );
        const Trophy = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        );

        // --- SUDOKU LOGIK ---
        const BLANK = 0;

        // Schwierigkeitsgrade
        const LEVELS = {
          'Anfänger': 45,
          'Leicht': 38,
          'Mittel': 32,
          'Schwer': 28,
          'Experte': 24,
          'Meister': 20,
        };

        const getRow = (board, row) => board[row];
        const getCol = (board, col) => board.map(r => r[col]);
        const getBox = (board, row, col) => {
          const box = [];
          const rStart = Math.floor(row / 3) * 3;
          const cStart = Math.floor(col / 3) * 3;
          for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
              box.push(board[rStart + i][cStart + j]);
            }
          }
          return box;
        };

        const isValid = (board, row, col, num) => {
          if (getRow(board, row).includes(num)) return false;
          if (getCol(board, col).includes(num)) return false;
          if (getBox(board, row, col).includes(num)) return false;
          return true;
        };

        const fillBoard = (board) => {
          for (let row = 0; row < 9; row++) {
            for (let col = 0; col < 9; col++) {
              if (board[row][col] === BLANK) {
                const nums = [1, 2, 3, 4, 5, 6, 7, 8, 9].sort(() => Math.random() - 0.5);
                for (let num of nums) {
                  if (isValid(board, row, col, num)) {
                    board[row][col] = num;
                    if (fillBoard(board)) return true;
                    board[row][col] = BLANK;
                  }
                }
                return false;
              }
            }
          }
          return true;
        };

        const countSolutions = (board, limit = 2) => {
          let count = 0;
          const solve = (b) => {
            for (let row = 0; row < 9; row++) {
              for (let col = 0; col < 9; col++) {
                if (b[row][col] === BLANK) {
                  for (let num = 1; num <= 9; num++) {
                    if (isValid(b, row, col, num)) {
                      b[row][col] = num;
                      solve(b);
                      b[row][col] = BLANK;
                      if (count >= limit) return;
                    }
                  }
                  return;
                }
              }
            }
            count++;
          };
          solve(board);
          return count;
        };

        const generateSudoku = (difficultyName) => {
          let fullBoard = Array.from({ length: 9 }, () => Array(9).fill(BLANK));
          fillBoard(fullBoard);
          const solution = fullBoard.map(row => [...row]);

          let puzzleBoard = fullBoard.map(row => [...row]);
          let cellsToRemove = 81 - LEVELS[difficultyName];

          let coords = [];
          for (let r = 0; r < 9; r++) {
            for (let c = 0; c < 9; c++) {
              coords.push({ r, c });
            }
          }
          coords.sort(() => Math.random() - 0.5);

          for (let { r, c } of coords) {
            if (cellsToRemove <= 0) break;
            if (puzzleBoard[r][c] === BLANK) continue;

            const backup = puzzleBoard[r][c];
            puzzleBoard[r][c] = BLANK;

            const copyForCount = puzzleBoard.map(row => [...row]);
            if (countSolutions(copyForCount) !== 1) {
              puzzleBoard[r][c] = backup;
            } else {
              cellsToRemove--;
            }
          }

          const initialGrid = [];
          for (let r = 0; r < 9; r++) {
            const rowArray = [];
            for (let c = 0; c < 9; c++) {
              const val = puzzleBoard[r][c];
              rowArray.push({
                row: r,
                col: c,
                value: val,
                isGiven: val !== BLANK,
                notes: [],
                isError: false
              });
            }
            initialGrid.push(rowArray);
          }

          return { initialGrid, solution };
        };

        // --- HAUPTKOMPONENTE ---
        function App() {
          const [grid, setGrid] = useState([]);
          const [solution, setSolution] = useState([]);
          const [selectedCell, setSelectedCell] = useState(null);
          const [difficulty, setDifficulty] = useState('Leicht');
          const [notesMode, setNotesMode] = useState(false);
          const [mistakes, setMistakes] = useState(0);
          const [timer, setTimer] = useState(0);
          const [isPlaying, setIsPlaying] = useState(false);
          const [isGameOver, setIsGameOver] = useState(false);
          const [isVictory, setIsVictory] = useState(false);
          const [history, setHistory] = useState([]);
          const [isLoading, setIsLoading] = useState(true);

          useEffect(() => {
            let interval;
            if (isPlaying && !isGameOver && !isVictory) {
              interval = setInterval(() => {
                setTimer((prev) => prev + 1);
              }, 1000);
            }
            return () => clearInterval(interval);
          }, [isPlaying, isGameOver, isVictory]);

          const initGame = useCallback((level) => {
            setIsLoading(true);
            setIsPlaying(false);
            
            setTimeout(() => {
              const { initialGrid, solution: newSolution } = generateSudoku(level);
              setGrid(initialGrid);
              setSolution(newSolution);
              setSelectedCell(null);
              setMistakes(0);
              setTimer(0);
              setHistory([]);
              setIsGameOver(false);
              setIsVictory(false);
              setIsPlaying(true);
              setNotesMode(false);
              setIsLoading(false);
            }, 50);
          }, []);

          useEffect(() => {
            initGame(difficulty);
          }, [difficulty, initGame]);

          const saveHistory = (currentGrid) => {
            setHistory(prev => [...prev, JSON.stringify(currentGrid)]);
          };

          const handleInput = useCallback((num) => {
            if (!selectedCell || isGameOver || isVictory || !isPlaying) return;
            const { row, col } = selectedCell;
            const cell = grid[row][col];

            if (cell.isGiven) return;

            const newGrid = grid.map(r => r.map(c => ({ ...c, notes: [...c.notes] })));
            const newCell = newGrid[row][col];

            if (notesMode) {
              if (newCell.value !== BLANK) return;
              if (newCell.notes.includes(num)) {
                newCell.notes = newCell.notes.filter(n => n !== num);
              } else {
                newCell.notes.push(num);
                newCell.notes.sort();
              }
              saveHistory(grid);
              setGrid(newGrid);
            } else {
              if (newCell.value === num) return;
              
              saveHistory(grid);
              newCell.value = num;
              
              if (num !== solution[row][col]) {
                newCell.isError = true;
                setMistakes(prev => {
                  const newMistakes = prev + 1;
                  if (newMistakes >= 3) {
                    setIsGameOver(true);
                    setIsPlaying(false);
                  }
                  return newMistakes;
                });
              } else {
                newCell.isError = false;
                removeNotesAfterPlacement(newGrid, row, col, num);
                checkVictory(newGrid);
              }
              setGrid(newGrid);
            }
          }, [selectedCell, grid, notesMode, solution, isGameOver, isVictory, isPlaying]);

          const removeNotesAfterPlacement = (currentGrid, row, col, num) => {
            for (let i = 0; i < 9; i++) {
              currentGrid[row][i].notes = currentGrid[row][i].notes.filter(n => n !== num);
              currentGrid[i][col].notes = currentGrid[i][col].notes.filter(n => n !== num);
            }
            const rStart = Math.floor(row / 3) * 3;
            const cStart = Math.floor(col / 3) * 3;
            for (let r = 0; r < 3; r++) {
              for (let c = 0; c < 3; c++) {
                currentGrid[rStart + r][cStart + c].notes = currentGrid[rStart + r][cStart + c].notes.filter(n => n !== num);
              }
            }
          };

          const checkVictory = (currentGrid) => {
            for (let r = 0; r < 9; r++) {
              for (let c = 0; c < 9; c++) {
                if (currentGrid[r][c].value !== solution[r][c]) {
                  return;
                }
              }
            }
            setIsVictory(true);
            setIsPlaying(false);
          };

          const handleErase = () => {
            if (!selectedCell || isGameOver || isVictory || !isPlaying) return;
            const { row, col } = selectedCell;
            const cell = grid[row][col];
            
            if (cell.isGiven) return;
            if (cell.value === BLANK && cell.notes.length === 0) return;

            saveHistory(grid);
            const newGrid = grid.map(r => r.map(c => ({ ...c, notes: [...c.notes] })));
            newGrid[row][col].value = BLANK;
            newGrid[row][col].notes = [];
            newGrid[row][col].isError = false;
            setGrid(newGrid);
          };

          const handleUndo = () => {
            if (history.length === 0 || isGameOver || isVictory || !isPlaying) return;
            const previousGridJSON = history[history.length - 1];
            setGrid(JSON.parse(previousGridJSON));
            setHistory(prev => prev.slice(0, -1));
          };

          const handleHint = () => {
            if (isGameOver || isVictory || !isPlaying) return;
            
            if (selectedCell) {
              const { row, col } = selectedCell;
              const cell = grid[row][col];
              if (!cell.isGiven && (cell.value === BLANK || cell.isError)) {
                saveHistory(grid);
                const newGrid = grid.map(r => r.map(c => ({ ...c, notes: [...c.notes] })));
                newGrid[row][col].value = solution[row][col];
                newGrid[row][col].isError = false;
                newGrid[row][col].notes = [];
                removeNotesAfterPlacement(newGrid, row, col, solution[row][col]);
                setGrid(newGrid);
                checkVictory(newGrid);
                return;
              }
            }

            let bestCell = null;
            let minOptions = 10;

            for (let r = 0; r < 9; r++) {
              for (let c = 0; c < 9; c++) {
                if (grid[r][c].value === BLANK) {
                  let options = 0;
                  for (let n = 1; n <= 9; n++) {
                     let isValidOption = true;
                     for(let i=0; i<9; i++) {
                         if(grid[r][i].value === n || grid[i][c].value === n) isValidOption = false;
                     }
                     const rStart = Math.floor(r / 3) * 3;
                     const cStart = Math.floor(c / 3) * 3;
                     for (let br = 0; br < 3; br++) {
                       for (let bc = 0; bc < 3; bc++) {
                         if (grid[rStart + br][cStart + bc].value === n) isValidOption = false;
                       }
                     }
                     if(isValidOption) options++;
                  }

                  if (options < minOptions) {
                    minOptions = options;
                    bestCell = { r, c };
                  }
                }
              }
            }

            if (bestCell) {
              const { r: row, c: col } = bestCell;
              saveHistory(grid);
              const newGrid = grid.map(r => r.map(c => ({ ...c, notes: [...c.notes] })));
              newGrid[row][col].value = solution[row][col];
              newGrid[row][col].isError = false;
              newGrid[row][col].notes = [];
              removeNotesAfterPlacement(newGrid, row, col, solution[row][col]);
              setGrid(newGrid);
              setSelectedCell({row, col});
              checkVictory(newGrid);
            }
          };

          useEffect(() => {
            const handleKeyDown = (e) => {
              if (!isPlaying || isGameOver || isVictory) return;

              if (/^[1-9]$/.test(e.key)) {
                handleInput(parseInt(e.key));
              }
              else if (e.key === 'Backspace' || e.key === 'Delete') {
                handleErase();
              }
              else if (e.key.startsWith('Arrow') && selectedCell) {
                e.preventDefault();
                let { row, col } = selectedCell;
                if (e.key === 'ArrowUp') row = Math.max(0, row - 1);
                if (e.key === 'ArrowDown') row = Math.min(8, row + 1);
                if (e.key === 'ArrowLeft') col = Math.max(0, col - 1);
                if (e.key === 'ArrowRight') col = Math.min(8, col + 1);
                setSelectedCell({ row, col });
              }
              else if (e.key.toLowerCase() === 'n') {
                setNotesMode(prev => !prev);
              }
            };

            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [isPlaying, isGameOver, isVictory, selectedCell, handleInput, notesMode]);

          const formatTime = (seconds) => {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
          };

          const getCellClasses = (rIndex, cIndex, cell) => {
            let classes = "w-full h-full flex items-center justify-center text-xl sm:text-2xl md:text-3xl font-medium cursor-pointer transition-colors relative select-none ";
            
            classes += "border-slate-300 ";
            if (rIndex % 3 === 2 && rIndex !== 8) classes += "border-b-slate-800 border-b-2 ";
            else classes += "border-b ";
            
            if (cIndex % 3 === 2 && cIndex !== 8) classes += "border-r-slate-800 border-r-2 ";
            else classes += "border-r ";

            if (rIndex === 0) classes += "border-t-0 ";
            if (cIndex === 0) classes += "border-l-0 ";

            const isSelected = selectedCell?.row === rIndex && selectedCell?.col === cIndex;
            let isRelated = false;
            let isSameNumber = false;

            if (selectedCell) {
              isRelated = selectedCell.row === rIndex || selectedCell.col === cIndex || 
                          (Math.floor(selectedCell.row/3) === Math.floor(rIndex/3) && Math.floor(selectedCell.col/3) === Math.floor(cIndex/3));
              
              const selectedValue = grid[selectedCell.row][selectedCell.col].value;
              if (selectedValue !== BLANK && selectedValue === cell.value) {
                isSameNumber = true;
              }
            }

            if (isSelected) {
              classes += "bg-blue-200 ";
            } else if (isSameNumber) {
              classes += "bg-blue-300/60 ";
            } else if (isRelated) {
              classes += "bg-blue-50 ";
            } else {
              classes += "bg-white hover:bg-blue-50/50 ";
            }

            if (cell.isError) {
              classes += "text-red-500 bg-red-100 ";
            } else if (cell.isGiven) {
              classes += "text-slate-900 ";
            } else {
              classes += "text-blue-600 ";
            }

            return classes;
          };

          if (isLoading) {
            return (
              <div className="min-h-screen flex items-center justify-center font-sans text-slate-800">
                <div className="text-2xl font-bold animate-pulse text-blue-600">Generiere Sudoku...</div>
              </div>
            );
          }

          return (
            <div className="min-h-screen flex flex-col items-center py-4 sm:py-8 font-sans text-slate-800 select-none">
              
              {/* Header */}
              <div className="w-full max-w-[500px] px-4 mb-4 flex justify-between items-center">
                <div>
                  <h1 className="text-2xl font-bold tracking-tight">Sudoku</h1>
                  <div className="flex items-center gap-2 mt-1">
                    <select 
                      value={difficulty} 
                      onChange={(e) => setDifficulty(e.target.value)}
                      className="text-sm bg-transparent font-medium text-slate-600 focus:outline-none cursor-pointer"
                    >
                      {Object.keys(LEVELS).map(lvl => (
                        <option key={lvl} value={lvl}>{lvl}</option>
                      ))}
                    </select>
                  </div>
                </div>
                
                <div className="flex flex-col items-end text-sm font-medium text-slate-600">
                  <div className="flex items-center gap-4">
                    <div className={`${mistakes > 0 ? 'text-red-500' : ''}`}>
                      Fehler: {mistakes}/3
                    </div>
                    <div className="flex items-center gap-1 w-16 justify-end">
                      {formatTime(timer)}
                      <button onClick={() => setIsPlaying(!isPlaying)} className="hover:text-blue-600 ml-1">
                        {isPlaying ? <Pause size={16} /> : <Play size={16} />}
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              {/* Main Game Area */}
              <div className="w-full max-w-[500px] px-4 relative">
                
                {/* Overlays */}
                {!isPlaying && !isGameOver && !isVictory && (
                  <div className="absolute inset-0 z-10 bg-slate-50/80 backdrop-blur-sm flex items-center justify-center">
                    <button 
                      onClick={() => setIsPlaying(true)}
                      className="bg-blue-600 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg hover:bg-blue-700 transition-transform hover:scale-105"
                    >
                      <Play size={32} className="ml-1" />
                    </button>
                  </div>
                )}

                {isGameOver && (
                  <div className="absolute inset-0 z-10 bg-slate-50/90 flex flex-col items-center justify-center rounded-xl">
                    <div className="text-red-500 font-bold text-3xl mb-2">Game Over</div>
                    <p className="text-slate-600 mb-6">Du hast 3 Fehler gemacht.</p>
                    <button 
                      onClick={() => initGame(difficulty)}
                      className="bg-blue-600 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-blue-700 transition-transform hover:scale-105"
                    >
                      Neuer Versuch
                    </button>
                  </div>
                )}

                {isVictory && (
                  <div className="absolute inset-0 z-10 bg-slate-50/90 flex flex-col items-center justify-center rounded-xl">
                    <Trophy size={64} className="text-yellow-500 mb-4 animate-bounce" />
                    <div className="text-blue-600 font-bold text-3xl mb-2">Gewonnen!</div>
                    <p className="text-slate-600 mb-2">Schwierigkeit: {difficulty}</p>
                    <p className="text-slate-600 mb-6">Zeit: {formatTime(timer)}</p>
                    <button 
                      onClick={() => initGame(difficulty)}
                      className="bg-blue-600 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-blue-700 transition-transform hover:scale-105"
                    >
                      Nächstes Spiel
                    </button>
                  </div>
                )}

                {/* Sudoku Grid */}
                <div className="aspect-square w-full bg-slate-800 border-2 border-slate-800 rounded-lg overflow-hidden shadow-sm">
                  <div className="grid grid-cols-9 grid-rows-9 w-full h-full bg-slate-300 gap-px">
                    {grid.map((row, rIndex) => 
                      row.map((cell, cIndex) => (
                        <div 
                          key={`${rIndex}-${cIndex}`}
                          onClick={() => setSelectedCell({row: rIndex, col: cIndex})}
                          className={getCellClasses(rIndex, cIndex, cell)}
                        >
                          {cell.value !== BLANK && <span>{cell.value}</span>}
                          
                          {cell.value === BLANK && cell.notes.length > 0 && (
                            <div className="absolute inset-1 grid grid-cols-3 grid-rows-3 text-[0.55rem] sm:text-xs leading-none text-slate-500 pointer-events-none">
                              {[1,2,3,4,5,6,7,8,9].map(n => (
                                <div key={n} className="flex items-center justify-center">
                                  {cell.notes.includes(n) ? n : ''}
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      ))
                    )}
                  </div>
                </div>

                {/* Controls */}
                <div className="flex justify-between items-center mt-6 px-4">
                  <button onClick={handleUndo} className="flex flex-col items-center gap-1 text-slate-600 hover:text-blue-600 transition-colors disabled:opacity-50" disabled={history.length === 0}>
                    <div className="w-12 h-12 bg-slate-200 rounded-full flex items-center justify-center mb-1">
                      <RotateCcw size={22} />
                    </div>
                    <span className="text-xs font-medium">Zurück</span>
                  </button>
                  
                  <button onClick={handleErase} className="flex flex-col items-center gap-1 text-slate-600 hover:text-blue-600 transition-colors">
                    <div className="w-12 h-12 bg-slate-200 rounded-full flex items-center justify-center mb-1">
                      <Eraser size={22} />
                    </div>
                    <span className="text-xs font-medium">Radieren</span>
                  </button>
                  
                  <button onClick={() => setNotesMode(!notesMode)} className={`flex flex-col items-center gap-1 transition-colors ${notesMode ? 'text-blue-600' : 'text-slate-600 hover:text-blue-600'}`}>
                    <div className={`w-12 h-12 rounded-full flex items-center justify-center mb-1 transition-colors ${notesMode ? 'bg-blue-600 text-white' : 'bg-slate-200'}`}>
                      <PenLine size={22} />
                    </div>
                    <span className="text-xs font-medium">Notizen {notesMode ? 'An' : 'Aus'}</span>
                  </button>
                  
                  <button onClick={handleHint} className="flex flex-col items-center gap-1 text-slate-600 hover:text-blue-600 transition-colors">
                    <div className="w-12 h-12 bg-slate-200 rounded-full flex items-center justify-center mb-1">
                      <Lightbulb size={22} />
                    </div>
                    <span className="text-xs font-medium">Tipp</span>
                  </button>
                </div>

                {/* Numpad */}
                <div className="grid grid-cols-9 gap-1 sm:gap-2 mt-8">
                  {[1, 2, 3, 4, 5, 6, 7, 8, 9].map((num) => (
                    <button
                      key={num}
                      onClick={() => handleInput(num)}
                      className="aspect-[3/4] sm:aspect-square bg-white text-blue-600 text-2xl sm:text-3xl font-medium rounded-lg shadow-sm border border-slate-200 hover:bg-blue-50 hover:border-blue-300 active:scale-95 transition-all flex items-center justify-center"
                    >
                      {num}
                    </button>
                  ))}
                </div>

              </div>
            </div>
          );
        }

        // --- RENDER APP ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
